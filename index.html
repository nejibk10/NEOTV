<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartoon TV</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #00c6ff;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.2);
}

.player {
    margin-top: 30px;
}

iframe {
    width: 100%;
    height: 500px;
    border-radius: 10px;
    border: none;
}
</style>
</head>

<body>

<div class="container">

<h1>🎬 Dessins Animés</h1>

<div class="grid">

<div class="card" onclick="playVideo('https://www.youtube.com/embed/VIDEO_ID_1')">
    <h3>Tom & Jerry</h3>
</div>

<div class="card" onclick="playVideo('https://www.youtube.com/embed/VIDEO_ID_2')">
    <h3>Dragon Ball</h3>
</div>

<div class="card" onclick="playVideo('https://www.youtube.com/embed/VIDEO_ID_3')">
    <h3>Pokemon</h3>
</div>

</div>

<div class="player">
    <iframe id="player"></iframe>
</div>

</div>

<script>
function playVideo(url) {
    document.getElementById("player").src = url;
}
</script>

</body>
</html>
