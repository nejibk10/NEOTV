<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CartoonFlix</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #141414;
    color: white;
}

.header {
    padding: 20px;
    font-size: 2rem;
    color: #e50914;
    font-weight: bold;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 15px;
    padding: 20px;
}

.card {
    background: #222;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.1);
}

.card img {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

.card h3 {
    padding: 10px;
    font-size: 1rem;
}

.player {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: black;
    padding: 10px;
}

iframe {
    width: 100%;
    height: 300px;
    border: none;
}
button {
    width: 100%;
    padding: 10px;
    background: #e50914;
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="header">🎬 CartoonFlix</div>

<div class="grid">

<!-- SCHTROUMPFS -->
<div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/en/2/2a/Smurfs.png">
    <h3>Les Schtroumpfs</h3>
    <button onclick="openSmurfs()">Regarder</button>
</div>

<!-- YOUTUBE EXEMPLE -->
<div class="card" onclick="playVideo('https://www.youtube.com/embed/aqz-KE-bpKQ')">
    <img src="https://img.youtube.com/vi/aqz-KE-bpKQ/hqdefault.jpg">
    <h3>Dessin animé fun</h3>
</div>

<div class="card" onclick="playVideo('https://www.youtube.com/embed/tgbNymZ7vqY')">
    <img src="https://img.youtube.com/vi/tgbNymZ7vqY/hqdefault.jpg">
    <h3>Cartoon épisode</h3>
</div>

</div>

<!-- PLAYER -->
<div class="player">
    <iframe id="player"></iframe>
</div>

<script>
function playVideo(url) {
    document.getElementById("player").src = url;
}

function openSmurfs() {
    window.open("https://www.tv5mondeplus.com/fr/jeunesse/a-partir-de-6-ans/les-schtroumpfs-s-1-e1-la-schtroumpfette", "_blank");
}
</script>

</body>
</html>
