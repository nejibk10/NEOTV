<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CartoonFlix PRO</title>
<style>
body { margin:0; font-family: Arial; background:#141414; color:white; }
.header { padding:20px; display:flex; justify-content:space-between; align-items:center; background:#141414; border-bottom:1px solid #333; }
.header h1 { color:#e50914; }
.category-section { margin-top:20px; }
.category-title { font-size:1.5rem; margin:10px 20px; color:#e50914; }
.carousel { display:flex; overflow-x:auto; padding:10px 20px; gap:10px; scroll-behavior:smooth; }
.card { min-width:180px; background:#222; border-radius:10px; overflow:hidden; cursor:pointer; transition:0.3s; }
.card img { width:100%; height:120px; object-fit:cover; }
.card h3 { padding:5px 10px; font-size:1rem; }
.card p { padding:0 10px 5px; font-size:0.85rem; color:#aaa; }
.player { position:fixed; bottom:0; width:100%; background:black; display:none; }
iframe { width:100%; height:300px; border:none; }
</style>
</head>
<body>

<div class="header">
    <h1>🎬 CartoonFlix PRO</h1>
    <a href="admin.html" style="color:white; text-decoration:none; padding:6px 12px; background:#e50914; border-radius:4px;">Admin</a>
</div>

<div id="categoriesContainer"></div>

<div class="player" id="playerContainer">
    <iframe id="player"></iframe>
</div>

<script>
// ==== CATEGORIES ====
const categories = [
  "3-5 ans","6-8 ans","9-12 ans",
  "Après l'école","À regarder en famille","Podcasts",
  "Séries animées","Films Comédie","Films Aventure",
  "Les plus regardés"
];

let videos = JSON.parse(localStorage.getItem("videos")) || [];

function displayVideosByCategory(cat){
    const container = document.getElementById("categoriesContainer");
    container.innerHTML="";

    categories.forEach(category=>{
        let catVideos = videos.filter(v=>v.category===category);
        if(category==="Les plus regardés"){
            catVideos = [...videos].sort((a,b)=>b.views-a.views).slice(0,20);
        }
        if(catVideos.length===0) return;

        let section = document.createElement("div");
        section.className = "category-section";

        let title = document.createElement("div");
        title.className="category-title";
        title.textContent = category;
        section.appendChild(title);

        let carousel = document.createElement("div");
        carousel.className="carousel";

        catVideos.forEach((v,i)=>{
            let card = document.createElement("div");
            card.className="card";
            card.innerHTML = `<img src="${v.image}"><h3>${v.title}</h3><p>👁️ ${v.views}</p>`;
            card.onclick = ()=>playVideo(i);
            carousel.appendChild(card);
        });

        section.appendChild(carousel);
        container.appendChild(section);
    });
}

function playVideo(index){
    videos[index].views++;
    localStorage.setItem("videos",JSON.stringify(videos));
    const playerContainer = document.getElementById("playerContainer");
    const player = document.getElementById("player");
    player.src = videos[index].url;
    playerContainer.style.display="block";
    displayVideosByCategory();
}

// INIT
displayVideosByCategory();
</script>
</body>
</html>
