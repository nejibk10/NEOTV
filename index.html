<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CartoonFlix</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #141414;
    color: white;
}

.header {
    padding: 20px;
    font-size: 2rem;
    color: #e50914;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
}

button {
    padding: 10px;
    background: #e50914;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 15px;
    padding: 20px;
}

.card {
    background: #222;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

.card h3 {
    padding: 10px;
    font-size: 1rem;
}

.card p {
    padding: 0 10px 10px;
    color: #aaa;
}

.player {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: black;
}

iframe {
    width: 100%;
    height: 300px;
    border: none;
}
</style>
</head>

<body>

<div class="header">
    🎬 CartoonFlix
    <button onclick="checkAdmin()">➕ Ajouter</button>
</div>

<div class="grid" id="videoList"></div>

<div class="player">
    <iframe id="player"></iframe>
</div>

<script>
const ADMIN_PASSWORD = "1234"; // change ça !

function checkAdmin() {
    let pass = prompt("Mot de passe ?");
    if(pass === ADMIN_PASSWORD){
        addVideo();
    } else {
        alert("❌ Accès refusé !");
    }
}

// Charger ou créer liste
let videos = JSON.parse(localStorage.getItem("videos")) || [];

// Sauvegarder
function saveVideos() {
    localStorage.setItem("videos", JSON.stringify(videos));
    location.reload();
}

// Ajouter vidéo
function addVideo() {
    let title = prompt("Nom ?");
    let type = prompt("Type (youtube / external)");
    let url = prompt("Lien vidéo");

    let image = "";

    if(type === "youtube"){
        let id = url.split("v=")[1];
        url = "https://www.youtube.com/embed/" + id;
        image = "https://img.youtube.com/vi/" + id + "/hqdefault.jpg";
    } else {
        image = prompt("Lien image");
    }

    videos.push({
        title,
        type,
        url,
        image,
        views: 0
    });

    saveVideos();
}

// Affichage
const container = document.getElementById("videoList");

videos.forEach((video, index) => {

    if(!video.views) video.views = 0;

    if(video.type === "youtube"){
        container.innerHTML += `
        <div class="card" onclick="playVideo(${index})">
            <img src="${video.image}">
            <h3>${video.title}</h3>
            <p>👁️ ${video.views} vues</p>
        </div>`;
    }

    if(video.type === "external"){
        container.innerHTML += `
        <div class="card">
            <img src="${video.image}">
            <h3>${video.title}</h3>
            <p>👁️ ${video.views} vues</p>
            <button onclick="openVideo(${index})">Regarder</button>
        </div>`;
    }

});

// Lecture vidéo
function playVideo(index) {
    videos[index].views++;
    localStorage.setItem("videos", JSON.stringify(videos));
    document.getElementById("player").src = videos[index].url;
}

// Lien externe
function openVideo(index){
    videos[index].views++;
    localStorage.setItem("videos", JSON.stringify(videos));
    window.open(videos[index].url);
}
</script>

</body>
</html>
