<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CartoonFlix PRO - Admin</title>
<style>
body{margin:0;font-family:Arial;background:#141414;color:white;}
.header{display:flex;justify-content:space-between;align-items:center;padding:20px;background:#141414;border-bottom:1px solid #333;}
.header h1{color:#e50914;font-size:2rem;}
button{padding:6px 10px;border:none;border-radius:4px;cursor:pointer;}
button.add{background:#e50914;color:white;}
button.edit{background:#ffaa00;color:black;}
button.delete{background:#ff3333;color:white;}
button.quit{background:#555;color:white;}
button.test{background:#00c6ff;color:white;}
.grid{display:grid;grid-template-columns: repeat(auto-fill,minmax(180px,1fr));gap:15px;padding:20px;}
.card{background:#222;border-radius:10px;overflow:hidden;transition:0.3s;padding:10px;}
.card img{width:100%;height:150px;object-fit:cover;border-radius:5px;}
.card h3{margin:5px 0;font-size:1rem;}
.card p{color:#aaa;font-size:0.85rem;margin:5px 0;}
.card .actions{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;}
</style>
</head>
<body>

<div class="header">
<h1>🎬 CartoonFlix Admin</h1>
<div>
<button class="add" onclick="addVideo()">➕ Ajouter</button>
<button class="quit" onclick="quitAdmin()">↩️ Quitter</button>
</div>
</div>

<div class="grid" id="videoList"></div>

<script>
const ADMIN_PASSWORD="1234";
const categories = [
"3-5 ans","6-8 ans","9-12 ans",
"Après l'école","À regarder en famille","Podcasts",
"Séries animées","Films Comédie","Films Aventure"
];

let videos = JSON.parse(localStorage.getItem("videos")) || [];

// Vérification mot de passe
(function(){
    let pass = prompt("Mot de passe Admin ?");
    if(pass !== ADMIN_PASSWORD){ alert("❌ Accès refusé !"); window.close(); }
})();

// Sauvegarde et affichage
function saveVideos(){ 
    localStorage.setItem("videos", JSON.stringify(videos)); 
    displayVideos(); 
}

// Ajouter une vidéo
function addVideo(){
    let title = prompt("Nom de la vidéo ?");
    if(!title) return;

    let type = prompt("Type (youtube / external) ?");
    if(!type) return;

    let url = prompt("Lien vidéo ?");
    if(!url) return;

    let image = type==="youtube" 
        ? "https://img.youtube.com/vi/"+(url.split("v=")[1] || url.split("/").pop())+"/hqdefault.jpg"
        : prompt("Lien image ?");

    let catList = categories.map((c,i)=>`${i+1} - ${c}`).join("\n");
    let catNum = parseInt(prompt("Choisir la catégorie par numéro :\n"+catList));
    if(isNaN(catNum) || catNum<1 || catNum>categories.length){ alert("Numéro invalide !"); return; }
    let category = categories[catNum-1];

    videos.push({title,type,url,image,views:0,category});
    saveVideos();
}

// Modifier vidéo
function editVideo(i){
    let v = videos[i];
    let title = prompt("Nom ?",v.title); if(!title) return;
    let type = prompt("Type (youtube / external)?",v.type);
    let url = prompt("Lien ?",v.url); if(!url) return;
    let image = v.image;
    if(type==="external") image = prompt("Lien image ?",v.image);

    let catList = categories.map((c,j)=>`${j+1} - ${c}`).join("\n");
    let catNum = parseInt(prompt("Choisir la catégorie par numéro :\n"+catList, categories.indexOf(v.category)+1));
    if(isNaN(catNum) || catNum<1 || catNum>categories.length){ alert("Numéro invalide !"); return; }
    let category = categories[catNum-1];

    videos[i] = {title,type,url,image,views:v.views,category};
    saveVideos();
}

// Supprimer vidéo
function deleteVideo(i){ 
    if(confirm("Supprimer cette vidéo ?")){ 
        videos.splice(i,1); 
        saveVideos(); 
    } 
}

// Afficher vidéos
function displayVideos(){
    const container = document.getElementById("videoList");
    container.innerHTML="";
    videos.forEach((v,i)=>{
        container.innerHTML+=`<div class="card">
        <img src="${v.image}">
        <h3>${v.title}</h3>
        <p>Catégorie: ${v.category}</p>
        <p>👁️ Vues: ${v.views}</p>
        <div class="actions">
        <button class="edit" onclick="editVideo(${i})">✏️ Modifier</button>
        <button class="delete" onclick="deleteVideo(${i})">❌ Supprimer</button>
        <button class="test" onclick="playExternal(${i})">▶️ Tester</button>
        </div></div>`;
    });
}

// Quitter admin
function quitAdmin(){ window.location.href="index.html"; }

// Tester external
function playExternal(index){
    let v = videos[index];
    if(v.type==="external"){
        const newWin = window.open(v.url,"_blank");
        setTimeout(()=>{ newWin.location.reload(); },1000);
    }else{
        alert("Cette fonction est réservée aux vidéos 'external'.");
    }
}

// Initialisation
displayVideos();
</script>

</body>
</html>
